    <h1>AI Answer Sheet Evaluation</h1>

    <div class="card">

        <label>Paper ID</label>

        <input
            type="text"
            id="paperId"
            placeholder="Example: QP-1783065732612">

        <label>Student Name</label>

        <input
            type="text"
            id="studentName">

        <label>Roll Number</label>

        <input
            type="text"
            id="rollNo">

        <label>Upload Answer Sheet</label>

        <input
            type="file"
            id="answerSheet" name="answerSheet"
            accept=".pdf,.jpg,.jpeg,.png">

        <button onclick="uploadAnswerSheet()">

            Upload Answer Sheet

        </button>
