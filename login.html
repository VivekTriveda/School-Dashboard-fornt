<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Question Paper ERP</title>

    <link rel="stylesheet" href="css/login.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- LEFT PANEL -->

    <div class="left-panel">

        <div class="erp-logo">

            <i class="fa-solid fa-graduation-cap"></i>

        </div>

        <h1>Question Paper ERP</h1>

        <h3>

            Welcome Back

        </h3>

        <div class="feature">
            <i class="fa-solid fa-circle-check"></i>
            Secure Login
        </div>

        <div class="feature">
            <i class="fa-solid fa-circle-check"></i>
            Multi School ERP
        </div>

        <div class="feature">
            <i class="fa-solid fa-circle-check"></i>
            Role Based Access
        </div>

        <div class="feature">
            <i class="fa-solid fa-circle-check"></i>
            Safe & Secure
        </div>

    </div>

    <!-- RIGHT PANEL -->

    <div class="right-panel">

        <h2 class="title">

            Login

        </h2>

        <p class="subtitle">

            Login to continue

        </p>

        <!-- LOGIN TABS -->

        <div class="tabs">

            <button
            id="adminTab"
            class="active">

                🛡 Super Admin

            </button>

            <button
            id="principalTab">

                🏫 Principal

            </button>

        </div>

        <!-- LOGIN FORM -->

        <form id="loginForm">

            <div class="input-group">

                <label>

                    Username

                </label>

                <div class="input-box">

                    <i class="fa-solid fa-user"></i>

                    <input
                    id="username"
                    type="text"
                    placeholder="Enter Username">

                </div>

            </div>

            <div class="input-group">

                <label>

                    Password

                </label>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input
                    id="password"
                    type="password"
                    placeholder="Enter Password">

                    <i
                    id="togglePassword"
                    class="fa-solid fa-eye eye"></i>

                </div>

            </div>

            <div class="options">

                <label>

                    <input type="checkbox">

                    Remember Me

                </label>

                <a href="#">

                    Forgot Password?

                </a>

            </div>

            <button
            type="submit"
            class="btn btn-primary">

                Login

            </button>

        </form>

        <div class="footer">

            Don't have an account?

            <a href="register.html">

                Create Account

            </a>

        </div>

        <div class="back">

            <a href="index.html">

                ← Back to Home

            </a>

        </div>

    </div>

</div>

<script src="js/login.js"></script>

</body>

</html>
